<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OptiReg — Login</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
<style>
  :root {
    --blue-50:#E6F1FB;--blue-100:#B5D4F4;--blue-200:#85B7EB;
    --blue-400:#378ADD;--blue-600:#185FA5;--blue-800:#0C447C;--blue-900:#042C53;
    --teal-400:#1D9E75;
    --gray-100:#F1EFE8;--gray-200:#D3D1C7;--gray-400:#888780;
    --surface:#FFFFFF;--bg:#F5F7FA;
    --text-primary:#1A1A1A;--text-secondary:#5F5E5A;--text-muted:#888780;
    --border:#E2E4E9;--border-focus:#378ADD;
    --radius-sm:8px;--radius-md:12px;--radius-lg:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text-primary);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}

  .card{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);padding:40px 36px;width:100%;max-width:420px;}

  .logo-row{display:flex;align-items:center;gap:10px;margin-bottom:32px;}
  .logo-mark{width:38px;height:38px;border-radius:9px;background:var(--blue-900);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .logo-mark svg{width:20px;height:20px;}
  .logo-name{font-size:18px;font-weight:600;color:var(--text-primary);}
  .logo-tag{font-size:11px;color:var(--text-muted);}

  .page-title{font-size:22px;font-weight:600;margin-bottom:6px;}
  .page-sub{font-size:14px;color:var(--text-secondary);margin-bottom:28px;line-height:1.5;}

  /* Tabs */
  .tabs{display:flex;border:1px solid var(--border);border-radius:var(--radius-sm);padding:3px;gap:3px;margin-bottom:24px;}
  .tab{flex:1;padding:8px;text-align:center;font-size:13px;font-weight:500;border-radius:6px;cursor:pointer;color:var(--text-muted);transition:all .15s;}
  .tab.active{background:var(--blue-900);color:#fff;}

  /* Panels */
  .panel{display:none;}
  .panel.active{display:block;}

  /* Fields */
  .field-group{margin-bottom:18px;}
  label{font-size:13px;font-weight:500;color:var(--text-secondary);display:block;margin-bottom:6px;}
  input[type="text"],input[type="email"],input[type="tel"],input[type="password"]{
    width:100%;height:44px;padding:0 14px;border:1px solid var(--border);border-radius:var(--radius-sm);
    background:var(--surface);font-family:inherit;font-size:14px;color:var(--text-primary);
    outline:none;transition:border-color .15s;
  }
  input:focus{border-color:var(--border-focus);box-shadow:0 0 0 3px rgba(55,138,221,.12);}
  input::placeholder{color:var(--text-muted);}
  input.invalid{border-color:#E24B4A;}

  .field-error{font-size:11px;color:#A32D2D;margin-top:4px;display:none;}
  .field-error.show{display:block;}

  /* OTP digits */
  .otp-row{display:flex;gap:8px;justify-content:center;margin-bottom:16px;}
  .otp-digit{width:44px;height:52px;text-align:center;font-size:20px;font-weight:600;
    font-family:'DM Mono',monospace;border:1.5px solid var(--border);border-radius:var(--radius-sm);
    background:var(--surface);color:var(--text-primary);outline:none;transition:border-color .15s;}
  .otp-digit:focus{border-color:var(--border-focus);box-shadow:0 0 0 3px rgba(55,138,221,.12);}

  /* Buttons */
  .btn-primary{width:100%;height:44px;background:var(--blue-400);color:#fff;border:none;
    border-radius:var(--radius-sm);font-family:inherit;font-size:14px;font-weight:500;
    cursor:pointer;transition:background .15s;margin-top:4px;}
  .btn-primary:hover{background:var(--blue-600);}
  .btn-primary.loading{opacity:.65;pointer-events:none;}
  .btn-link{background:none;border:none;color:var(--blue-400);font-family:inherit;font-size:13px;
    font-weight:500;cursor:pointer;padding:0;}
  .btn-link:hover{color:var(--blue-600);text-decoration:underline;}

  /* Error banner */
  .err-banner{background:#FCEBEB;color:#A32D2D;border:1px solid #F09595;border-radius:var(--radius-sm);
    padding:10px 14px;font-size:13px;margin-bottom:16px;display:none;}
  .err-banner.show{display:block;}
  .ok-banner{background:#EAF3DE;color:#3B6D11;border:1px solid #97C459;border-radius:var(--radius-sm);
    padding:10px 14px;font-size:13px;margin-bottom:16px;display:none;}
  .ok-banner.show{display:block;}

  .divider{display:flex;align-items:center;gap:12px;margin:20px 0;}
  .divider-line{flex:1;height:1px;background:var(--border);}
  .divider-text{font-size:12px;color:var(--text-muted);}

  .register-link{text-align:center;margin-top:24px;font-size:13px;color:var(--text-secondary);}

  /* Password wrap */
  .pw-wrap{position:relative;}
  .pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--text-muted);font-size:12px;user-select:none;}
  input[type="password"]::-ms-reveal,input[type="password"]::-ms-clear{display:none;}

  /* Strength */
  .strength-bar{display:flex;gap:3px;margin-top:7px;}
  .strength-seg{height:3px;flex:1;border-radius:2px;background:var(--border);transition:background .3s;}
  .strength-seg.w{background:#A32D2D;}.strength-seg.m{background:#854F0B;}.strength-seg.s{background:var(--teal-400);}

  @media(max-width:480px){.card{padding:28px 20px;}}
</style>
</head>
<body style="visibility:hidden;">

<div class="card">

  <!-- Logo -->
  <div class="logo-row">
    <div class="logo-mark">
      <svg viewBox="0 0 22 22" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round">
        <circle cx="11" cy="11" r="4"/>
        <path d="M2 11h2M18 11h2M11 2v2M11 18v2"/>
        <path d="M4.9 4.9l1.4 1.4M15.7 15.7l1.4 1.4M4.9 17.1l1.4-1.4M15.7 6.3l1.4-1.4"/>
      </svg>
    </div>
    <div>
      <div class="logo-name">OptiReg</div>
      <div class="logo-tag">For eye-care professionals</div>
    </div>
  </div>

  <div class="page-title">Welcome back</div>
  <div class="page-sub">Login to your professional account.</div>

  <!-- Login method tabs -->
  <div class="tabs">
    <div class="tab active" id="tabPhone" onclick="switchTab('phone')">Mobile OTP</div>
    <div class="tab" id="tabEmail" onclick="switchTab('email')">Email & password</div>
  </div>

  <!-- ── Phone OTP login ── -->
  <div class="panel active" id="panelPhone">

    <!-- Step A: Enter mobile -->
    <div id="phoneStep1">
      <div class="err-banner" id="phoneErr"></div>
      <div class="field-group">
        <label>Mobile number</label>
        <input type="tel" id="loginMobile" placeholder="+91 98765 43210">
        <div class="field-error" id="loginMobileErr"></div>
      </div>
      <button class="btn-primary" id="sendOtpBtn" onclick="sendLoginOtp()">Send OTP</button>
    </div>

    <!-- Step B: Enter OTP -->
    <div id="phoneStep2" style="display:none;">
      <div class="ok-banner show" id="otpSentBanner">Code sent. Check your messages.</div>
      <div class="err-banner" id="otpErr"></div>
      <div class="otp-row">
        <input class="otp-digit" id="p1" maxlength="1" type="tel">
        <input class="otp-digit" id="p2" maxlength="1" type="tel">
        <input class="otp-digit" id="p3" maxlength="1" type="tel">
        <input class="otp-digit" id="p4" maxlength="1" type="tel">
        <input class="otp-digit" id="p5" maxlength="1" type="tel">
        <input class="otp-digit" id="p6" maxlength="1" type="tel">
      </div>
      <button class="btn-primary" id="verifyOtpBtn" onclick="verifyLoginOtp()">Verify & login</button>
      <div style="text-align:center;margin-top:14px;font-size:12px;color:var(--text-muted);">
        Didn't receive it? <button class="btn-link" onclick="resendLoginOtp()">Resend</button>
        &nbsp;·&nbsp; <button class="btn-link" onclick="backToPhone()">Change number</button>
      </div>
    </div>

  </div>

  <!-- ── Email + password login ── -->
  <div class="panel" id="panelEmail">
    <div class="err-banner" id="emailErr"></div>
    <div class="field-group">
      <label>Email address</label>
      <input type="email" id="loginEmail" placeholder="you@clinic.com">
      <div class="field-error" id="loginEmailErr"></div>
    </div>
    <div class="field-group">
      <label>Password</label>
      <div class="pw-wrap">
        <input type="password" id="loginPassword" placeholder="Your password">
        <span class="pw-toggle" onclick="togglePw()">Show</span>
      </div>
      <div class="field-error" id="loginPasswordErr"></div>
    </div>
    <button class="btn-primary" id="emailLoginBtn" onclick="emailLogin()">Login</button>
  </div>

  <!-- Register link -->
  <div class="register-link">
    New to OptiReg? <a href="/Opti-eye-care/index.html" style="color:var(--blue-400);font-weight:500;text-decoration:none;">Create an account</a>
  </div>

</div>

<script>
var sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Redirect if already logged in
sb.auth.getSession().then(function(r) {
  if (r.data && r.data.session) {
    window.location.replace('/Opti-eye-care/dashboard.html');
  } else {
    document.body.style.visibility = 'visible';
  }
});

// ── Tab switching ─────────────────────────────
function switchTab(tab) {
  document.getElementById('tabPhone').classList.toggle('active', tab === 'phone');
  document.getElementById('tabEmail').classList.toggle('active', tab === 'email');
  document.getElementById('panelPhone').classList.toggle('active', tab === 'phone');
  document.getElementById('panelEmail').classList.toggle('active', tab === 'email');
  clearErrors();
}

function clearErrors() {
  ['phoneErr','otpErr','emailErr','loginMobileErr','loginEmailErr','loginPasswordErr'].forEach(function(id) {
    var el = document.getElementById(id);
    if (el) { el.textContent = ''; el.classList.remove('show'); }
  });
}

// ── OTP digits setup ──────────────────────────
var otpIds = ['p1','p2','p3','p4','p5','p6'];
otpIds.forEach(function(id, idx) {
  var el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('input', function() {
    el.value = el.value.replace(/\D/g, '');
    if (el.value && idx < 5) { var nx = document.getElementById(otpIds[idx+1]); if (nx) nx.focus(); }
  });
  el.addEventListener('keydown', function(e) {
    if (e.key === 'Backspace' && !el.value && idx > 0) { var pv = document.getElementById(otpIds[idx-1]); if (pv) { pv.value = ''; pv.focus(); } }
  });
});

function getOtp() { return otpIds.map(function(id) { var el = document.getElementById(id); return el ? el.value : ''; }).join(''); }
function clearOtp() { otpIds.forEach(function(id) { var el = document.getElementById(id); if (el) el.value = ''; }); }

function formatMobile(mob) {
  return mob.startsWith('+') ? mob : '+91' + mob.replace(/\D/g, '');
}

// ── Phone OTP login ───────────────────────────
async function sendLoginOtp() {
  clearErrors();
  var mob = document.getElementById('loginMobile').value.trim();
  if (!mob || mob.replace(/\D/g,'').length < 10) {
    var e = document.getElementById('loginMobileErr');
    e.textContent = 'Enter a valid mobile number'; e.classList.add('show');
    document.getElementById('loginMobile').classList.add('invalid');
    return;
  }
  document.getElementById('loginMobile').classList.remove('invalid');
  var btn = document.getElementById('sendOtpBtn');
  btn.textContent = 'Sending…'; btn.classList.add('loading');
  var fmt = formatMobile(mob);
  try {
    var r = await sb.auth.signInWithOtp({ phone: fmt });
    if (r.error) throw r.error;
    document.getElementById('phoneStep1').style.display = 'none';
    document.getElementById('phoneStep2').style.display = 'block';
    setTimeout(function() { var el = document.getElementById('p1'); if (el) el.focus(); }, 120);
  } catch(err) {
    var e = document.getElementById('phoneErr');
    e.textContent = err.message || 'Could not send OTP. Check the number.';
    e.classList.add('show');
  } finally {
    btn.textContent = 'Send OTP'; btn.classList.remove('loading');
  }
}

async function resendLoginOtp() {
  var mob = document.getElementById('loginMobile').value.trim();
  var fmt = formatMobile(mob);
  try {
    await sb.auth.signInWithOtp({ phone: fmt });
    var b = document.getElementById('otpSentBanner');
    b.textContent = 'Code resent!'; b.classList.add('show');
    clearOtp();
    setTimeout(function() { var el = document.getElementById('p1'); if (el) el.focus(); }, 120);
  } catch(e) {
    var err = document.getElementById('otpErr');
    err.textContent = 'Could not resend. Try again.'; err.classList.add('show');
  }
}

function backToPhone() {
  document.getElementById('phoneStep1').style.display = 'block';
  document.getElementById('phoneStep2').style.display = 'none';
  clearOtp(); clearErrors();
}

async function verifyLoginOtp() {
  var code = getOtp();
  if (code.length < 6) {
    var e = document.getElementById('otpErr');
    e.textContent = 'Enter all 6 digits.'; e.classList.add('show');
    return;
  }
  var btn = document.getElementById('verifyOtpBtn');
  btn.textContent = 'Verifying…'; btn.classList.add('loading');
  document.getElementById('otpErr').classList.remove('show');
  var mob = document.getElementById('loginMobile').value.trim();
  var fmt = formatMobile(mob);
  try {
    var r = await sb.auth.verifyOtp({ phone: fmt, token: code, type: 'sms' });
    if (r.error) throw r.error;
    window.location.href = '/Opti-eye-care/dashboard.html';
  } catch(err) {
    var e = document.getElementById('otpErr');
    e.textContent = err.message || 'Invalid code. Try again.'; e.classList.add('show');
    clearOtp();
  } finally {
    btn.textContent = 'Verify & login'; btn.classList.remove('loading');
  }
}

// ── Email + password login ────────────────────
async function emailLogin() {
  clearErrors();
  var em = document.getElementById('loginEmail').value.trim();
  var pw = document.getElementById('loginPassword').value;
  var ok = true;
  if (!em || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em)) {
    var e = document.getElementById('loginEmailErr'); e.textContent = 'Enter a valid email'; e.classList.add('show');
    document.getElementById('loginEmail').classList.add('invalid'); ok = false;
  }
  if (!pw) {
    var e = document.getElementById('loginPasswordErr'); e.textContent = 'Enter your password'; e.classList.add('show');
    document.getElementById('loginPassword').classList.add('invalid'); ok = false;
  }
  if (!ok) return;
  var btn = document.getElementById('emailLoginBtn');
  btn.textContent = 'Logging in…'; btn.classList.add('loading');
  try {
    var r = await sb.auth.signInWithPassword({ email: em, password: pw });
    if (r.error) throw r.error;
    window.location.href = '/Opti-eye-care/dashboard.html';
  } catch(err) {
    var e = document.getElementById('emailErr');
    e.textContent = err.message || 'Login failed. Check your email and password.';
    e.classList.add('show');
  } finally {
    btn.textContent = 'Login'; btn.classList.remove('loading');
  }
}

// ── Password toggle ───────────────────────────
function togglePw() {
  var inp = document.getElementById('loginPassword');
  var btn = document.querySelector('.pw-toggle');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? 'Show' : 'Hide';
}
</script>
</body>
</html>
